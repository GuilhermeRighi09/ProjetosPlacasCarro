<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENAI - Estacionamento Online</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
   <header>
        <div class="logo">
    <img src="{{ url_for('static', filename='logosenai.png') }}" alt="Logo SENAI">
</div>
        <nav style="display: flex; align-items: center; gap: 20px;">
            <span>Estacionamento Online</span>
            <a href="{{ url_for('listar_veiculos') }}" style="text-decoration: none; background-color: #005b96; color: white; padding: 8px 16px; border-radius: 5px; font-weight: bold;">Painel Admin</a>
        </nav>
    </header>

    <main class="container">
        <section class="monitoramento">
            <h2>Monitoramento em Tempo Real</h2>
            <div class="card">
                <div class="status-indicator active"></div>
                <div class="info-veiculo">
                    <p><strong>Proprietário:</strong> {{ dados.nome }}</p>
                    <p><strong>Curso:</strong> {{ dados.curso }}</p>
                    <p><strong>Placa:</strong> <span class="placa">{{ dados.placa }}</span></p>
                    <p><strong>Status:</strong> {{ dados.status }}</p>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
