<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Veículo - SENAI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <div class="logo">
    <img src="{{ url_for('static', filename='logosenai.png') }}" alt="Logo SENAI">
</div>
        <nav><a href="{{ url_for('listar_veiculos') }}" class="link-voltar">Voltar para a Lista</a></nav>
    </header>

    <main class="container">
        <h2>Editar Cadastro de {{ veiculo.proprietario }}</h2>

        <div class="card form-card">
            <form action="{{ url_for('editar_veiculo', id=veiculo.id) }}" method="POST">

                <div class="form-group">
                    <label for="imagem">URL da Imagem do Veículo (Opcional):</label>
                    <input type="url" id="imagem" name="imagem" value="{{ veiculo.imagem }}" placeholder="Cole o link da imagem aqui">
                </div>

                <div class="form-group">
                    <label for="proprietario">Nome do Professor/Proprietário:</label>
                    <input type="text" id="proprietario" name="proprietario" value="{{ veiculo.proprietario }}" required>
                </div>

                <div class="form-group">
                    <label for="placa">Placa do Veículo:</label>
                    <input type="text" id="placa" name="placa" value="{{ veiculo.placa }}" maxlength="8" required>
                </div>

                <div class="form-group">
                    <label for="modelo">Modelo:</label>
                    <input type="text" id="modelo" name="modelo" value="{{ veiculo.modelo }}" required>
                </div>

                <div class="form-group">
                    <label for="cor">Cor:</label>
                    <input type="text" id="cor" name="cor" value="{{ veiculo.cor }}" required>
                </div>

                <div class="form-group">
                    <label for="status">Status de Acesso:</label>
                    <select id="status" name="status">
                        <option value="Cadastrado" {% if veiculo.status == 'Cadastrado' %}selected{% endif %}>Cadastrado (Liberado)</option>
                        <option value="Bloqueado" {% if veiculo.status == 'Bloqueado' %}selected{% endif %}>Bloqueado</option>
                        <option value="Procurado" {% if veiculo.status == 'Procurado' %}selected{% endif %}>Procurado (Alerta)</option>
                    </select>
                </div>

                <button type="submit" class="btn-salvar">Salvar Alterações</button>
            </form>
        </div>
    </main>
</body>
</html>
